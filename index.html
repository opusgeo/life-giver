<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life-Giver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #011627; overflow: hidden; }
    canvas { display: block; }

    /* ── Top HUD (Progress) ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px;
      pointer-events: none;
      z-index: 200;
    }
    #island-label {
      color: rgba(255,255,255,0.55);
      font-family: 'Georgia', serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #progress-bar-container {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      width: 200px;
      height: 6px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a8edea, #fed6e3);
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    /* ── Hint ── */
    #hint {
      position: fixed;
      bottom: 95px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: 'Georgia', serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      pointer-events: none;
      transition: opacity 1.5s ease;
      white-space: nowrap;
      z-index: 100;
    }

    /* ── Tools Bar (Bottom Unified) ── */
    #tools-bar {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(10, 10, 20, 0.7);
      padding: 10px 24px;
      border-radius: 30px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      z-index: 1000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .tool-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .divider {
      width: 1.5px;
      height: 24px;
      background: rgba(255, 255, 255, 0.15);
      margin: 0 4px;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      transition: all 0.25s;
      padding: 6px 14px;
      border-radius: 15px;
      outline: none;
    }
    .icon-btn:hover { 
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
      color: white; 
      transform: translateY(-2px);
    }
    .icon-btn:active { transform: translateY(0); }
    
    #next-btn {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      color: #011627;
      padding: 8px 18px;
      border-radius: 20px;
      font-family: 'Georgia', serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
    #next-btn:hover { 
      background: #fff; 
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 0 25px rgba(255,255,255,0.5);
    }
    #next-btn.ready {
      animation: button-glow 2s infinite;
      background: linear-gradient(135deg, #fff, #a8edea);
      box-shadow: 0 0 20px rgba(168,237,234,0.6);
    }
    @keyframes button-glow {
      0% { box-shadow: 0 0 10px rgba(168,237,234,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 30px rgba(168,237,234,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 10px rgba(168,237,234,0.4); transform: scale(1); }
    }

    #blur-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 60px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
      outline: none;
    }
    #blur-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    /* Conditional icons */
    #camera-toggle.isometric { background: rgba(100, 180, 255, 0.25); color: #fff; border-color: rgba(100, 180, 255, 0.5); }
    #camera-toggle.isometric .mode-persp { display: none; }
    #camera-toggle:not(.isometric) .mode-iso { display: none; }
    #music-toggle.muted span, #sfx-toggle.muted span { opacity: 0.3; }
    #music-toggle:not(.muted) span, #sfx-toggle:not(.muted) span { opacity: 1; }

    /* Removed theme-toggle rules */

    /* ── Tilt-Shift Blur ── */
    #tilt-shift-top, #tilt-shift-bottom {
      position: fixed;
      left: 0; right: 0;
      height: 22vh;
      pointer-events: none;
      z-index: 5;
      backdrop-filter: blur(var(--blur-amt, 6px));
      -webkit-backdrop-filter: blur(var(--blur-amt, 6px));
    }
    #tilt-shift-top {
      top: 0;
      mask-image: linear-gradient(to bottom, black, transparent);
      -webkit-mask-image: linear-gradient(to bottom, black, transparent);
    }
    #tilt-shift-bottom {
      bottom: 0;
      mask-image: linear-gradient(to top, black, transparent);
      -webkit-mask-image: linear-gradient(to top, black, transparent);
    }

    /* ── Messages ── */
    #flight-msg, #completion-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 400;
    }
    #flight-msg.show, #completion-overlay.show { opacity: 1; }
    #flight-msg p, #completion-text {
      color: white;
      font-family: 'Georgia', serif;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(168,237,234,0.8), 0 0 60px rgba(168,237,234,0.4);
      animation: float-text 3s ease-in-out infinite;
    }
    @keyframes float-text {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    /* --- MOBILE RESPONSIVE --- */
  @media (max-width: 768px) {
    #hud { padding: 10px; }
    .bottom-toolbar {
      bottom: 12px;
      gap: 12px;
      padding: 0 15px;
      height: 40px;
    }
    .icon-btn { width: 34px; height: 34px; }
    .icon-btn svg { width: 18px; height: 18px; }
    
    #dev-tools-container {
      width: 200px !important;
      right: 5px !important;
      top: 50px !important;
      bottom: 70px !important;
      max-height: none !important;
      gap: 8px !important;
    }
    .dev-panel { 
      padding: 10px !important; 
      min-width: 0 !important;
    }
    .dev-panel h4 { font-size: 10px !important; }
    .dev-panel span, .dev-panel div { font-size: 9px !important; }
    #lens-panel {
      bottom: 65px !important;
      transform: translateX(-50%) scale(0.85) !important;
    }
    header h1 { font-size: 14px !important; }
    #island-label { font-size: 10px !important; }
  }

  /* ── Level Selector (Top) ── */
  #level-selector {
    position: fixed;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    background: rgba(0, 0, 0, 0.65); /* More solid background */
    padding: 8px 16px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.15);
    z-index: 1000;
    pointer-events: auto;
    max-width: 90vw;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .level-item {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,0.85); /* Much higher contrast */
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
  }
  .level-item:hover {
    background: rgba(255,255,255,0.25);
    color: #fff;
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.5);
  }
  .level-item.active {
    background: #fff;
    color: #011627;
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
    transform: scale(1.15);
  }
</style>
</head>
<body>

  <div id="hud">
    <div id="island-label">✦ FARMHOUSE 1/6</div>
    <div id="progress-bar-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <div id="level-selector">
    <!-- Level dots injected by main.js -->
  </div>

  <p id="hint">click to bring life &nbsp;✦&nbsp; drag to explore</p>

  <div id="flight-msg"><p>✦ &nbsp; travelling &nbsp; ✦</p></div>
  <div id="completion-overlay"><p id="completion-text">✦ LEVEL COMPLETED ✦</p></div>

  <div id="tilt-shift-top"></div>
  <div id="tilt-shift-bottom"></div>

  <div id="tools-bar">
    <button id="music-toggle" class="icon-btn" title="Toggle Music">
      <span style="font-size: 9px;">MUSIC</span>
    </button>
    <div class="divider"></div>
    <button id="sfx-toggle" class="icon-btn" title="Toggle SFX">
      <span style="font-size: 9px;">SFX</span>
    </button>

    <div class="divider"></div>

    <select id="theme-select" class="icon-btn" title="Select Theme" style="-webkit-appearance: none; appearance: none; text-align: center; cursor: pointer; border-radius: 15px; background: rgba(255,255,255,0.06); outline: none;">
      <option value="0" style="background: #011627; color: white;">🌅 MORNING</option>
      <option value="1" style="background: #011627; color: white;">🌙 NIGHT</option>
      <option value="2" style="background: #011627; color: white;">🌌 AURORA</option>
      <option value="3" style="background: #011627; color: white;">🌇 SUNSET</option>
      <option value="4" style="background: #011627; color: white;">🌃 MIDNIGHT</option>
      <option value="5" style="background: #011627; color: white;">🌫️ FOGGY</option>
      <option value="6" style="background: #011627; color: white;">🎬 CINEMATIC</option>
    </select>

    <div class="divider"></div>

    <div class="tool-group">
      <span style="font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.4);">BLUR</span>
      <input type="range" id="blur-slider" min="0" max="25" value="12">
    </div>

    <div class="divider"></div>

    <button id="camera-toggle" class="icon-btn" title="Switch Camera">
      <span class="mode-persp">📷 PERSP</span>
      <span class="mode-iso">📐 ISO</span>
    </button>

    <div class="divider"></div>

    <button id="walk-mode-btn" class="icon-btn" title="Navigation Mode (Orbit / 1st Person / 3rd Person)">
      <span id="walk-mode-label">🌐 ORBIT</span>
    </button>

    <button id="sync-btn" class="icon-btn" title="Sync with Blender (Hot-Reload)">
      <span>🔄 SYNC</span>
    </button>

    <div class="divider"></div>

    <button id="next-btn">SKIP ✦</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
